# =============================================================================
# GAD Backend — CD Workflow (Deploy to Cloud Run)
# =============================================================================
# Triggered on push to main.
# Builds the Docker image, pushes it to Google Artifact Registry, and deploys
# the new image to Cloud Run.
#
# Required GitHub Secrets:
#   GCP_PROJECT_ID          — Your Google Cloud project ID
#   GCP_SERVICE_ACCOUNT_KEY — JSON key for a service account with these roles:
#     • Artifact Registry Writer
#     • Cloud Run Admin
#     • Service Account User
# =============================================================================

name: CD — Backend (Cloud Run)

on:
  push:
    branches: [main]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  SERVICE_NAME: gad-backend
  REGION: europe-west1                    # Cloud Run service region
  ARTIFACT_REGISTRY_REPO: gad-backend     # Artifact Registry repository name
  IMAGE: europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/gad-backend/gad-backend:latest

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    # Only run if the CI workflow succeeded on the same commit
    # (GitHub doesn't natively support "wait for CI", but you can configure
    #  branch protection rules to require CI to pass before merging.)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # Authenticate to Google Cloud
      # ------------------------------------------------------------------
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      # ------------------------------------------------------------------
      # Configure Docker for Artifact Registry
      # ------------------------------------------------------------------
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker europe-west1-docker.pkg.dev

      # ------------------------------------------------------------------
      # Build and push the Docker image
      # ------------------------------------------------------------------
      - name: Build Docker image
        run: docker build -t ${{ env.IMAGE }} .

      - name: Push Docker image to Artifact Registry
        run: docker push ${{ env.IMAGE }}

      # ------------------------------------------------------------------
      # Deploy to Cloud Run
      # ------------------------------------------------------------------
      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE }}
          env_vars: |
            NODE_ENV=production
          secrets: |
            GEMINI_API_KEY=GEMINI_API_KEY:latest
            GOOGLE_APPLICATION_CREDENTIALS=GOOGLE_APPLICATION_CREDENTIALS:latest
